<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Viewer - 模型预览器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #16213e;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #0f3460;
    }

    .sidebar-header h1 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #e94560;
    }

    .sidebar-header p {
      font-size: 12px;
      color: #888;
    }

    .model-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .model-item {
      padding: 12px 16px;
      margin: 6px 0;
      background: #1f4068;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .model-item:hover {
      background: #2a5a8a;
    }

    .model-item.active {
      border-color: #e94560;
      background: #2a5a8a;
    }

    .model-item-name {
      font-size: 14px;
      font-weight: 500;
    }

    .model-item-format {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    .main-view {
      flex: 1;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      background: rgba(22, 33, 62, 0.9);
      padding: 12px 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .control-btn {
      padding: 10px 16px;
      background: #1f4068;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .control-btn:hover {
      background: #e94560;
    }

    .control-btn.active {
      background: #e94560;
    }

    .model-info {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(22, 33, 62, 0.9);
      padding: 16px 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      min-width: 200px;
    }

    .model-info h3 {
      font-size: 14px;
      color: #e94560;
      margin-bottom: 10px;
    }

    .model-info p {
      font-size: 12px;
      color: #888;
      margin: 4px 0;
    }

    .loading-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(22, 33, 62, 0.95);
      padding: 30px 50px;
      border-radius: 16px;
      text-align: center;
      display: none;
    }

    .loading-overlay.show {
      display: block;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #1f4068;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .upload-area {
      margin: 10px;
      padding: 20px;
      border: 2px dashed #0f3460;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .upload-area:hover {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.1);
    }

    .upload-area p {
      font-size: 13px;
      color: #888;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .tip {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(22, 33, 62, 0.9);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      color: #888;
    }

    .tip kbd {
      background: #1f4068;
      padding: 2px 6px;
      border-radius: 4px;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>3D Model Viewer</h1>
        <p>使用: ?file=/static/模型文件名.glb</p>
      </div>

      <div class="model-list" id="model-list"></div>
    </div>

    <div class="main-view">
      <div id="canvas-container"></div>

      <div class="tip">
        <kbd>左键</kbd> 旋转 | <kbd>右键</kbd> 平移 | <kbd>滚轮</kbd> 缩放
      </div>

      <div class="model-info" id="model-info" style="display:none">
        <h3>当前模型</h3>
        <p id="info-name">-</p>
        <p id="info-format">格式: -</p>
      </div>

      <div class="controls">
        <button class="control-btn" id="btn-reset">重置视角</button>
        <button class="control-btn" id="btn-wireframe">线框模式</button>
        <button class="control-btn" id="btn-rotate">自动旋转</button>
        <button class="control-btn" id="btn-center">居中模型</button>
      </div>

      <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    // ==================== 配置 ====================
    const CONFIG = {
      models: [
        // 在此添加模型: { name: '显示名称', path: '文件名.glb' }
      ],
      defaultModel: '',
      backgroundColor: 0x1a1a2e
    };

    // ==================== 全局变量 ====================
    let scene, camera, renderer, controls;
    let currentModel = null;
    let isWireframe = false;
    let isAutoRotate = false;

    // ==================== 初始化 ====================
    function init() {
      const container = document.getElementById('canvas-container');

      scene = new THREE.Scene();
      scene.background = new THREE.Color(CONFIG.backgroundColor);

      camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(3, 3, 3);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.shadowMap.enabled = true;
      container.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.target.set(0, 0, 0);

      setupLights();
      createGridHelper();
      setupEventListeners();
      renderModelList();

      // 检查 URL 参数加载模型
      const urlParams = new URLSearchParams(window.location.search);
      const fileParam = urlParams.get('file');

      if (fileParam) {
        // 从 URL 参数加载
        const fileName = fileParam.split('/').pop();
        const modelInfo = {
          name: fileName.replace(/\.[^/.]+$/, ''),
          path: fileParam.replace('/static/', '')
        };
        loadModelByPath(fileParam);
      } else if (CONFIG.defaultModel) {
        const model = CONFIG.models.find(m => m.path === CONFIG.defaultModel);
        if (model) loadModel(model);
      } else if (CONFIG.models.length > 0) {
        loadModel(CONFIG.models[0]);
      }

      animate();
    }

    function setupLights() {
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);

      const main = new THREE.DirectionalLight(0xffffff, 1);
      main.position.set(5, 10, 7.5);
      main.castShadow = true;
      scene.add(main);

      const fill = new THREE.DirectionalLight(0xffffff, 0.3);
      fill.position.set(-5, 5, -5);
      scene.add(fill);
    }

    function createGridHelper() {
      const grid = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
      grid.position.y = -1;
      scene.add(grid);
    }

    // ==================== 模型加载 ====================
    function loadModel(modelInfo) {
      showLoading(true);

      if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
      }

      const ext = modelInfo.path.split('.').pop().toLowerCase();
      const fullPath = '/static/' + modelInfo.path;
      const basePath = '/static/' + modelInfo.path.replace(/[^/]*$/, '');

      const onComplete = (object) => {
        currentModel = object.scene || object;
        centerAndScaleModel(currentModel);
        applyMaterialSettings(currentModel);
        scene.add(currentModel);
        updateModelInfo(modelInfo);
        setActiveModel(modelInfo.path);
        showLoading(false);
      };

      const onProgress = (xhr) => {
        if (xhr.total > 0) {
          console.log('加载:', (xhr.loaded / xhr.total * 100).toFixed(0) + '%');
        }
      };

      const onError = (error) => {
        console.error('加载失败:', error);
        showLoading(false);
      };

      switch (ext) {
        case 'glb':
        case 'gltf': {
          const loader = new GLTFLoader();
          const draco = new DRACOLoader();
          draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
          loader.setDRACOLoader(draco);
          loader.setPath(basePath);
          loader.load(modelInfo.path, onComplete, onProgress, onError);
          break;
        }
        case 'obj': {
          const objLoader = new OBJLoader();
          const mtlPath = fullPath.replace('.obj', '.mtl');
          const mtlLoader = new MTLLoader();
          mtlLoader.setPath(basePath);
          mtlLoader.load(
            modelInfo.path.replace('.obj', '.mtl'),
            (materials) => {
              materials.preload();
              objLoader.setMaterials(materials);
              objLoader.load(fullPath, onComplete, onProgress, onError);
            },
            onProgress,
            () => objLoader.load(fullPath, onComplete, onProgress, onError)
          );
          break;
        }
        case 'stl': {
          const loader = new STLLoader();
          loader.load(fullPath, (geometry) => {
            const material = new THREE.MeshStandardMaterial({ color: 0x888888 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = -Math.PI / 2;
            onComplete(mesh);
          }, onProgress, onError);
          break;
        }
        case 'fbx': {
          const loader = new FBXLoader();
          loader.setPath(basePath);
          loader.load(modelInfo.path, onComplete, onProgress, onError);
          break;
        }
        default:
          console.error('不支持的格式:', ext);
          showLoading(false);
      }
    }

    function centerAndScaleModel(model) {
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      model.position.sub(center);
      const maxDim = Math.max(size.x, size.y, size.z);
      model.scale.setScalar(2 / maxDim);
    }

    function applyMaterialSettings(model) {
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
    }

    // ==================== UI ====================
    function renderModelList() {
      const list = document.getElementById('model-list');
      if (CONFIG.models.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>暂无模型<br><small>请在 static 目录放入模型</small></p></div>';
        return;
      }
      list.innerHTML = CONFIG.models.map(m => {
        const ext = m.path.split('.').pop().toUpperCase();
        return `<div class="model-item" data-path="${m.path}" onclick="window.loadModelByPath('${m.path}')">
          <div class="model-item-name">${m.name}</div>
          <div class="model-item-format">${ext} 格式</div>
        </div>`;
      }).join('');
    }

    window.loadModelByPath = (path) => {
      // 从完整路径提取文件名
      const fileName = path.split('/').pop();
      // 优先从配置列表查找
      const model = CONFIG.models.find(m => m.path === path || m.path === fileName);
      if (model) {
        loadModel(model);
      } else {
        // 直接从路径加载
        const modelInfo = {
          name: fileName.replace(/\.[^/.]+$/, ''),
          path: path.startsWith('/static/') ? path.replace('/static/', '') : path
        };
        loadModel(modelInfo);
      }
    };

    function setActiveModel(path) {
      document.querySelectorAll('.model-item').forEach(el => {
        el.classList.toggle('active', el.dataset.path === path);
      });
    }

    function updateModelInfo(modelInfo) {
      const info = document.getElementById('model-info');
      info.style.display = 'block';
      document.getElementById('info-name').textContent = modelInfo.name;
      document.getElementById('info-format').textContent = '格式: ' + modelInfo.path.split('.').pop().toUpperCase();
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('show', show);
    }

    // ==================== 控制按钮 ====================
    function setupEventListeners() {
      document.getElementById('btn-reset').addEventListener('click', () => {
        controls.reset();
        camera.position.set(3, 3, 3);
        controls.target.set(0, 0, 0);
      });

      document.getElementById('btn-wireframe').addEventListener('click', function() {
        isWireframe = !isWireframe;
        this.classList.toggle('active', isWireframe);
        if (currentModel) {
          currentModel.traverse((child) => {
            if (child.isMesh && child.material) {
              child.material.wireframe = isWireframe;
            }
          });
        }
      });

      document.getElementById('btn-rotate').addEventListener('click', function() {
        isAutoRotate = !isAutoRotate;
        this.classList.toggle('active', isAutoRotate);
        controls.autoRotate = isAutoRotate;
        controls.autoRotateSpeed = 2;
      });

      document.getElementById('btn-center').addEventListener('click', () => {
        if (currentModel) centerAndScaleModel(currentModel);
      });

      // 窗口调整
      window.addEventListener('resize', () => {
        const container = document.getElementById('canvas-container');
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      });
    }

    // ==================== 动画循环 ====================
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    // ==================== 启动 ====================
    init();
  </script>
</body>
</html>
